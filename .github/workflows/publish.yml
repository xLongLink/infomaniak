name: Publish to PyPI

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    id-token: write
    contents: write

jobs:
    publish:
        name: Build, publish, and release
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Determine next patch version
              id: package_version
              run: |
                  LATEST_TAG="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
                  if [[ -n "${LATEST_TAG}" ]]; then
                    if [[ ! "${LATEST_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                      echo "Latest tag '${LATEST_TAG}' does not follow v<major>.<minor>.<patch>" >&2
                      exit 1
                    fi
                    MAJOR="${BASH_REMATCH[1]}"
                    MINOR="${BASH_REMATCH[2]}"
                    PATCH="${BASH_REMATCH[3]}"
                  else
                    LATEST_TAG=""
                    MAJOR="0"
                    MINOR="0"
                    PATCH="0"
                  fi

                  VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
                  TAG="v${VERSION}"

                  echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"
                  echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
                  echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

            - name: Sync project version for this run
              run: |
                  python - <<'PY'
                  import os
                  import re
                  from pathlib import Path

                  version = os.environ["VERSION"]
                  pyproject_path = Path("pyproject.toml")
                  pyproject_content = pyproject_path.read_text(encoding="utf-8")
                  updated_content = re.sub(
                      r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
                      f'version = "{version}"',
                      pyproject_content,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  pyproject_path.write_text(updated_content, encoding="utf-8")
                  PY
              env:
                  VERSION: ${{ steps.package_version.outputs.version }}

            - name: Build package
              run: |
                  pip install build
                  python -m build

            - name: Create changelog for release
              id: release_notes
              run: |
                  NOTES_FILE="release-notes.md"
                  PREVIOUS_TAG="${{ steps.package_version.outputs.latest_tag }}"

                  {
                    echo "## Changes"
                    echo
                    if [[ -n "${PREVIOUS_TAG}" ]]; then
                      git log --no-merges --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..HEAD"
                    else
                      git log --no-merges --pretty=format:'- %s (%h)'
                    fi
                  } > "${NOTES_FILE}"

                  echo "notes_file=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"

            - name: Create and push tag
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git tag "${{ steps.package_version.outputs.tag }}"
                  git push origin "${{ steps.package_version.outputs.tag }}"

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.package_version.outputs.tag }}
                  name: ${{ steps.package_version.outputs.tag }}
                  body_path: ${{ steps.release_notes.outputs.notes_file }}
                  files: dist/*
