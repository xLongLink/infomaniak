name: Publish to PyPI

on:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    id-token: write

jobs:
    publish:
        name: Build & publish to PyPI
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Build package
              run: |
                  pip install build
                  python -m build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
