name: Publish to PyPI

on:
    push:
        branches:
            - main
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    id-token: write
    contents: write

jobs:
    publish:
        name: Prepare release or publish
        if: startsWith(github.ref, 'refs/tags/v') || (github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Determine version from Git context
              id: package_version
              run: |
                  if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                    VERSION="${GITHUB_REF#refs/tags/v}"
                    FROM_TAG="true"
                  else
                    LATEST_TAG="$(git tag -l 'v*' --sort=-v:refname | head -n1)"
                    if [[ -n "${LATEST_TAG}" ]]; then
                      if [[ ! "${LATEST_TAG}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                        echo "Latest tag '${LATEST_TAG}' does not follow v<major>.<minor>.<patch>" >&2
                        exit 1
                      fi
                      MAJOR="${BASH_REMATCH[1]}"
                      MINOR="${BASH_REMATCH[2]}"
                      PATCH="${BASH_REMATCH[3]}"
                    else
                      MAJOR="0"
                      MINOR="0"
                      PATCH="0"
                    fi

                    VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
                    FROM_TAG="false"
                  fi

                  echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
                  echo "from_tag=${FROM_TAG}" >> "${GITHUB_OUTPUT}"

            - name: Create and push patch tag
              if: github.ref == 'refs/heads/main'
              run: |
                  git tag "v${{ steps.package_version.outputs.version }}"
                  git push origin "v${{ steps.package_version.outputs.version }}"

            - name: Sync project version for this run
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  python - <<'PY'
                  import os
                  import re
                  from pathlib import Path

                  version = os.environ["VERSION"]
                  pyproject_path = Path("pyproject.toml")
                  pyproject_content = pyproject_path.read_text(encoding="utf-8")
                  updated_content = re.sub(
                      r'^version\s*=\s*"\d+\.\d+\.\d+"\s*$',
                      f'version = "{version}"',
                      pyproject_content,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  pyproject_path.write_text(updated_content, encoding="utf-8")
                  PY
              env:
                  VERSION: ${{ steps.package_version.outputs.version }}

            - name: Build package
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                  pip install build
                  python -m build

            - name: Publish to PyPI
              if: startsWith(github.ref, 'refs/tags/v')
              uses: pypa/gh-action-pypi-publish@release/v1

            - name: Create GitHub release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.package_version.outputs.version }}
                  name: v${{ steps.package_version.outputs.version }}
                  generate_release_notes: true
                  files: dist/*
